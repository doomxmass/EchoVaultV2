

{% load static %}

<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Yoga Studio Template">
    <meta name="keywords" content="Yoga, unica, creative, html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Confirm Password</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Amatic+SC:400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:100,200,300,400,500,600,700,800,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/reset_pass_form_style.css' %}">
    <!-- bootstrap cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<body>

{% comment %}- style -{% endcomment %}
<style>
    .custom-message{
        background-color: rgb(250, 59, 75);
        padding: 4px 8px;
        border-radius: 12px;
    }
</style>
{% comment %}- END style -{% endcomment %}


    <div class="container mt-5 d-flex flex-column align-items-center justify-content-center">
        <div class="containr">
            <h4>Put your Email address to send confirm password reset link.</h4>
        </div>
        <div class="container d-flex flex-column align-items-center justify-content-center mt-5 gap-3">
            <h2>Enter New Password</h2>
            <form method="POST" class="d-flex flex-column align-items-center justify-content-center">
                {% csrf_token %}
                {{ form.as_p}}
                <button type="submit" class="btn btn-warning">Change Password</button>
            </form>
        </div>
    </div>


    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
